
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }

  .device {
    background: #060810;
    border-radius: 28px;
    border: 0.5px solid rgba(255,255,255,0.12);
    width: 340px;
    margin: 1rem auto;
    overflow: hidden;
    font-family: 'Instrument Sans', sans-serif;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 0;
  }
  .top-bar-title {
    font-size: 20px;
    font-weight: 500;
    color: #E8EAF0;
    font-family: 'Syne', sans-serif;
  }
  .top-bar-search {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #131826;
    border: 0.5px solid rgba(255,255,255,0.09);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8890B0;
    font-size: 18px;
    cursor: pointer;
  }

  .chip-rail {
    display: flex;
    gap: 8px;
    padding: 14px 16px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .chip-rail::-webkit-scrollbar { display: none; }

  .chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 12px;
    border-radius: 14px;
    background: #0D1120;
    border: 0.5px solid rgba(255,255,255,0.08);
    cursor: pointer;
    flex-shrink: 0;
    min-width: 56px;
    transition: background 0.15s, border-color 0.15s;
  }
  .chip.active {
    background: rgba(14, 165, 233, 0.13);
    border: 0.5px solid rgba(14, 165, 233, 0.35);
  }
  .chip i {
    font-size: 20px;
    color: #8890B0;
  }
  .chip.active i {
    color: #38BDF8;
  }
  .chip-label {
    font-size: 10px;
    color: #8890B0;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .chip.active .chip-label {
    color: #38BDF8;
  }

  .section-header {
    padding: 4px 16px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header i { font-size: 14px; color: #E8EAF0; }
  .section-title {
    font-size: 14px;
    font-weight: 500;
    color: #E8EAF0;
    flex: 1;
  }
  .section-count {
    font-size: 12px;
    color: #8890B0;
    background: #131826;
    border-radius: 6px;
    padding: 2px 8px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 16px 16px;
  }
  .channel-card {
    background: #0D1120;
    border-radius: 10px;
    border: 0.5px solid rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .card-artwork {
    aspect-ratio: 16/9;
    background: #131826;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-artwork i {
    font-size: 24px;
    color: #444E70;
  }
  .live-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: #EF4444;
    color: #fff;
    font-size: 9px;
    font-weight: 500;
    padding: 2px 5px;
    border-radius: 4px;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .live-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #fff;
  }
  .star-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    color: #F59E0B;
    font-size: 14px;
  }
  .prog-bar-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(255,255,255,0.1);
  }
  .prog-bar-fill {
    height: 100%;
    background: #0EA5E9;
    border-radius: 1px;
  }
  .card-meta {
    padding: 7px 8px 8px;
  }
  .card-name {
    font-size: 12px;
    font-weight: 500;
    color: #E8EAF0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-prog {
    font-size: 11px;
    color: #8890B0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .card-prog.live-time { color: #0EA5E9; }

  .mini-player {
    margin: 0 16px 16px;
    background: #0D1120;
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mp-logo {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #131826;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mp-logo i { font-size: 16px; color: #444E70; }
  .mp-info { flex: 1; min-width: 0; }
  .mp-name {
    font-size: 13px;
    font-weight: 500;
    color: #E8EAF0;
  }
  .mp-prog {
    font-size: 11px;
    color: #8890B0;
  }
  .mp-controls { display: flex; gap: 8px; align-items: center; }
  .mp-controls i { font-size: 18px; color: #8890B0; }
  .mp-controls i.play { color: #0EA5E9; font-size: 20px; }
  .mp-progress {
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px;
    margin-top: 6px;
  }
  .mp-progress-fill {
    height: 100%;
    width: 42%;
    background: #0EA5E9;
    border-radius: 1px;
  }
</style>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
