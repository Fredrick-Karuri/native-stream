version: "2"

linters:
  default: none
  enable:
    - errcheck       # unchecked errors
    - govet          # go vet checks
    - staticcheck    # static analysis
    - unused         # unused code
    - gofmt          # formatting
    - goimports      # import ordering
    - misspell       # spelling
    - bodyclose      # http response body not closed
    - noctx          # http requests without context
    - gosec          # security issues
    - exhaustive     # exhaustive enum switches

linters-settings:
  gosec:
    excludes:
      - G104   # errors unhandled — covered by errcheck
  goimports:
    local-prefixes: github.com/yourname/nativestream

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [gosec, errcheck]
    - path: "cmd/main\\.go"
      linters: [exhaustive]
  max-issues-per-linter: 50
  max-same-issues: 10