name: macOS CI

on:
  push:
    branches: [main, "develop", "feat/*"]
    paths:
      - "app/macos/**"
      - ".github/workflows/ci-macos.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/macos/**"

jobs:
  build:
    name: Build & Test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build (Release)
        working-directory: app/macos/NativeStream
        run: |
          set -o pipefail
          xcodebuild \
            -project NativeStream.xcodeproj \
            -scheme NativeStream \
            -configuration Release \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run tests
        working-directory: app/macos/NativeStream
        run: |
          set -o pipefail
          xcodebuild \
            -project NativeStream.xcodeproj \
            -scheme NativeStream \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath DerivedData \
            test \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty