name: Android CI

on:
  push:
    branches: [main, "develop", "feat/*"]
    paths:
      - "app/android/**"
      - ".github/workflows/ci-android.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/android/**"

jobs:
  test-and-build:
    name: Test & Verify Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Optimizes build speed by caching Gradle wrappers, dependencies, and build caches
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant Execute Permission to Gradle Wrapper
        working-directory: app/android
        run: chmod +x gradlew

      - name: Run Code Linting Verification
        working-directory: app/android
        run: ./gradlew lintDebug
      - name: Upload Lint Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/android/app/build/reports/lint-results-debug.html
      - name: Run Local Unit Tests
        working-directory: app/android
        run: ./gradlew testDebugUnitTest

      - name: Build Debug Verification APK
        working-directory: app/android
        run: ./gradlew assembleDebug

      # Stores the compiled debug APK as an artifact to download or inspect manually
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
