name: Server Release

on:
  push:
    tags:
      - 'server/v*'

jobs:
  release:
    name: Create Server Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get full history for precise changelogs

      - name: Extract Version from Tag
        id: parse_tag
        run: |
          # Input tag looks like: refs/tags/server/v1.2.3
          # Strips down to: 1.2.3
          RAW_TAG=${{ github.ref_name }}
          TAG_NAME=${RAW_TAG##*/}
          VERSION=${TAG_NAME#server/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/server/go.mod

      - name: Run server tests
        working-directory: app/server
        run: go test -race ./...

      - name: Build release binaries
        run: |
          VERSION=${{ steps.parse_tag.outputs.version }}
          mkdir -p dist

          # darwin arm64 (Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -C app/server \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../../dist/nativestream-server-darwin-arm64 ./cmd/

          # darwin amd64 (Intel Mac)
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -C app/server \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../../dist/nativestream-server-darwin-amd64 ./cmd/

          # linux amd64 (Docker / VPS)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -C app/server \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../../dist/nativestream-server-linux-amd64 ./cmd/

          # linux arm64 (Raspberry Pi)
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -C app/server \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../../dist/nativestream-server-linux-arm64 ./cmd/

          # Create tarballs
          cd dist
          tar -czf nativestream-server-darwin-arm64.tar.gz nativestream-server-darwin-arm64
          tar -czf nativestream-server-darwin-amd64.tar.gz nativestream-server-darwin-amd64
          tar -czf nativestream-server-linux-amd64.tar.gz  nativestream-server-linux-amd64
          tar -czf nativestream-server-linux-arm64.tar.gz  nativestream-server-linux-arm64

          # Generate SHA256 checksums
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Generate Scoped Changelog
        id: changelog
        run: |
          # Find the previous server tag to compare history accurately
          PREV_TAG=$(git describe --tags --abbrev=0 --match "server/v*" "${{ github.ref_name }}^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Target ONLY the server directory
          CHANGELOG=$(git log ${RANGE} \
            --pretty=format:"- %s (%h)" \
            --no-merges \
            -- app/server/ \
            | head -50)

          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.parse_tag.outputs.tag }}
          name: Server Release ${{ steps.parse_tag.outputs.version }}
          body: |
            ## Server Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### Docker
            ```bash
            docker pull ghcr.io/ github.repository /nativestream-server:{{ steps.parse_tag.outputs.version }}
            ```
          files: |
            dist/nativestream-server-darwin-arm64.tar.gz
            dist/nativestream-server-darwin-amd64.tar.gz
            dist/nativestream-server-linux-amd64.tar.gz
            dist/nativestream-server-linux-arm64.tar.gz
            dist/checksums.txt
          draft: false
          prerelease: false
