name: Server Release

on:
  push:
    tags:
      - 'server/v*'

jobs:
  release:
    name: Create Server Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version from Tag
        id: parse_tag
        run: |
          # github.ref_name for tag server/v1.2.3 is exactly "server/v1.2.3"
          RAW_TAG=${{ github.ref_name }}
          VERSION=${RAW_TAG#server/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/server/go.mod
          cache-dependency-path: app/server/go.sum

      - name: Run server tests
        working-directory: app/server
        run: go test -race ./...

      - name: Build release binaries
        run: |
          VERSION=${{ steps.parse_tag.outputs.version }}
          mkdir -p dist

          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -C app/server \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../../dist/nativestream-server-darwin-arm64 ./cmd/

          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -C app/server \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../../dist/nativestream-server-darwin-amd64 ./cmd/

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -C app/server \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../../dist/nativestream-server-linux-amd64 ./cmd/

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -C app/server \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../../dist/nativestream-server-linux-arm64 ./cmd/

          cd dist
          tar -czf nativestream-server-darwin-arm64.tar.gz nativestream-server-darwin-arm64
          tar -czf nativestream-server-darwin-amd64.tar.gz nativestream-server-darwin-amd64
          tar -czf nativestream-server-linux-amd64.tar.gz  nativestream-server-linux-amd64
          tar -czf nativestream-server-linux-arm64.tar.gz  nativestream-server-linux-arm64
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Generate Scoped Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --match "server/v*" "${{ github.ref_name }}^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          CHANGELOG=$(git log ${RANGE} \
            --pretty=format:"- %s (%h)" \
            --no-merges \
            -- app/server/ \
            | head -50)
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.parse_tag.outputs.tag }}
          name: Server v${{ steps.parse_tag.outputs.version }}
          body: |
            ## Server Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            Download the archive for your platform using the command below, then follow steps 2 and 3.

            **macOS — Apple Silicon**
            ```bash
            curl -L https://github.com/Fredrick-Karuri/native-stream/releases/download/server%2Fv${{ steps.parse_tag.outputs.version }}/nativestream-server-darwin-arm64.tar.gz | tar -xz
            sudo mv nativestream-server-darwin-arm64 /usr/local/bin/nativestream-server
            ```

            **macOS — Intel**
            ```bash
            curl -L https://github.com/Fredrick-Karuri/native-stream/releases/download/server%2Fv${{ steps.parse_tag.outputs.version }}/nativestream-server-darwin-amd64.tar.gz | tar -xz
            sudo mv nativestream-server-darwin-amd64 /usr/local/bin/nativestream-server
            ```

            **Linux — x64**
            ```bash
            curl -L https://github.com/Fredrick-Karuri/native-stream/releases/download/server%2Fv${{ steps.parse_tag.outputs.version }}/nativestream-server-linux-amd64.tar.gz | tar -xz
            sudo mv nativestream-server-linux-amd64 /usr/local/bin/nativestream-server
            ```

            **Linux — ARM64 (Raspberry Pi)**
            ```bash
            curl -L https://github.com/Fredrick-Karuri/native-stream/releases/download/server%2Fv${{ steps.parse_tag.outputs.version }}/nativestream-server-linux-arm64.tar.gz | tar -xz
            sudo mv nativestream-server-linux-arm64 /usr/local/bin/nativestream-server
            ```

            Verify your download against `checksums.txt` before running.

            **2. Run it**
            ```bash
            nativestream-server
            ```

            **3. Optional — run as a background service (auto-starts on login/boot)**
            ```bash
            nativestream-server --install-service
            ```

            To uninstall later:
            ```bash
            nativestream-server --uninstall-service`
            sudo rm /usr/local/bin/nativestream-server
            ```
          files: |
            dist/nativestream-server-darwin-arm64.tar.gz
            dist/nativestream-server-darwin-amd64.tar.gz
            dist/nativestream-server-linux-amd64.tar.gz
            dist/nativestream-server-linux-arm64.tar.gz
            dist/checksums.txt
          draft: false
          prerelease: false