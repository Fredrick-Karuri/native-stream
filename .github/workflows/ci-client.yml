name: Client CI

on:
  push:
    branches: [main, "phase/*", "feature/*"]
    paths:
      - "app/macos/**"
      - ".github/workflows/ci-client.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/macos/**"

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14   # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        working-directory: app/macos
        run: swiftlint lint --reporter github-actions-logging

  build:
    name: Build
    runs-on: macos-14
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build (Release)
        working-directory: app/macos
        run: |
          xcodebuild \
            -project NativeStreamMac.xcodeproj \
            -scheme NativeStreamMac \
            -configuration Release \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run tests
        working-directory: app/macos
        run: |
          xcodebuild \
            -project NativeStreamMac.xcodeproj \
            -scheme NativeStreamMac \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath DerivedData \
            test \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty