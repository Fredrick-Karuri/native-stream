name: Android Release

on:
  push:
    tags:
      - 'android/v*'

jobs:
  release:
    name: Build & Publish Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version from Tag
        id: parse_tag
        run: |
          RAW_TAG=${{ github.ref_name }}
          VERSION=${RAW_TAG#android/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission to Gradle Wrapper
        working-directory: app/android
        run: chmod +x gradlew

      - name: Build Production Release APK
        working-directory: app/android
        # Builds an unsigned release build ready for local parsing/testing 
        run: ./gradlew assembleRelease

      - name: Prepare Release Assets
        run: |
          mkdir -p dist
          cp app/android/app/build/outputs/apk/release/app-release-unsigned.apk dist/NativeStream-Android-v${{ steps.parse_tag.outputs.version }}.apk

      - name: Generate Scoped Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --match "android/v*" "${{ github.ref_name }}^" 2>/dev/null || echo "")
          RANGE=${PREV_TAG:+$PREV_TAG..}HEAD
          CHANGELOG=$(git log ${RANGE:-HEAD} --pretty=format:"- %s (%h)" --no-merges -- app/android/ | head -50)
          
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.parse_tag.outputs.tag }}
          name: Android Client v${{ steps.parse_tag.outputs.version }}
          body: |
            ## Android Updates
            ${{ steps.changelog.outputs.changelog }}

            ## Installation
            Download the `.apk` file below directly onto your mobile device or emulator to install.
          files: dist/*.apk
          draft: false
          prerelease: false
